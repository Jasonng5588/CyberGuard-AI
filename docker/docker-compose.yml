version: "3.9"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cyberguard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberbullying_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: cyberguard_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/cyberbullying_db
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - huggingface_cache:/root/.cache/huggingface

  # ─── Next.js Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: cyberguard_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  huggingface_cache:
